<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="text-center mb-4 baslik">QUIZ APP</h1>

    <div id="baslangicEkrani" class="card shadow-sm mx-auto p-4" style="max-width: 700px;">
      <p class="fs-5 mb-2">Soru sayısı: 5</p>
      <p class="fs-5 mb-4">Her soru için 15 saniye</p>

      <div class="text-center">
        <button id="baslatButonu" class="btn btn-warning btn-lg">
          Testi Başlat
        </button>
      </div>
    </div>

    <div id="testEkrani" class="card shadow-sm mx-auto p-4 d-none mt-4" style="max-width: 700px;">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div id="soruSayaci" class="fw-bold fs-5">Soru 1 / 5</div>
        <div class="badge bg-danger fs-6 px-3 py-2">
          Süre: <span id="sureAlani">15</span>
        </div>
      </div>

      <div class="mb-4">
        <h2 id="soruMetni" class="fs-4">Soru metni buraya gelecek</h2>
      </div>

      <div id="secenekAlani" class="d-grid gap-2 mb-4"></div>

      <div class="text-end">
        <button id="ileriButonu" class="btn btn-primary" disabled>İleri</button>
        <button id="bitirButonu" class="btn btn-success d-none">Testi Bitir</button>
      </div>

    </div>

    <div id="sonucEkrani" class="card shadow-sm mx-auto p-4 d-none mt-4 text-center" style="max-width: 700px;">
      <h2 class="mb-4">Test Bitti</h2>
      <p id="dogruSayisiAlani" class="fs-5 mb-2">Doğru Sayısı: 0</p>
      <p id="skorAlani" class="fs-5 mb-4">Skor: 0</p>

      <button id="yenidenBaslatButonu" class="btn btn-warning btn-lg">
        Testi Tekrar Başlat
      </button>
    </div>

  </div>

  <script src="sorular.js"></script>
  <script src="test.js"></script>
  <script src="arayuz.js"></script>
  <script src="script.js"></script>
</body>
</html>
